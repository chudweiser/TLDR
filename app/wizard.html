<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'">
<title>TLDR Local Setup</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:      #0f0f11;
    --surface: #18181c;
    --border:  #2a2a32;
    --text:    #e8e8f0;
    --muted:   #6b6b80;
    --accent:  #7c6af7;
    --accent2: #a78bfa;
    --green:   #4ade80;
    --red:     #f87171;
  }

  html, body {
    width: 560px; height: 520px;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: drag;
  }

  /* draggable titlebar */
  .titlebar {
    height: 36px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .titlebar span {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .body {
    -webkit-app-region: no-drag;
    padding: 36px 48px 32px;
    display: flex;
    flex-direction: column;
    gap: 0;
    height: calc(100% - 36px);
  }

  .logo {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 8px;
  }

  h1 {
    font-size: 26px;
    font-weight: 600;
    line-height: 1.2;
    margin-bottom: 10px;
    color: var(--text);
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 32px;
  }

  /* Steps */
  .steps {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 32px;
    flex: 1;
  }

  .step {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    transition: border-color 0.2s, opacity 0.2s;
  }

  .step.active  { border-color: var(--accent); }
  .step.done    { border-color: var(--green); opacity: 0.7; }
  .step.waiting { opacity: 0.4; }

  .step-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 1px;
    transition: background 0.2s;
  }
  .step.active .step-icon  { background: var(--accent); }
  .step.done   .step-icon  { background: var(--green); color: #000; }

  .step-text strong {
    display: block;
    font-weight: 500;
    font-size: 13px;
    margin-bottom: 2px;
  }
  .step-text span {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
  }

  /* Log output */
  .log {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: #0a0a0c;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    height: 72px;
    overflow-y: auto;
    line-height: 1.6;
    display: none;
    margin-bottom: 20px;
  }
  .log.visible { display: block; }

  /* Buttons */
  .actions { display: flex; gap: 10px; }

  button {
    flex: 1;
    padding: 12px 20px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
  }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover:not(:disabled) { opacity: 0.85; }

  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover:not(:disabled) { border-color: var(--accent); }

  .status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    margin-right: 6px;
    vertical-align: middle;
  }
  .status-dot.ok  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.err { background: var(--red);   box-shadow: 0 0 6px var(--red); }
  .status-dot.spin {
    background: var(--accent);
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="titlebar">
  <span>TLDR Local — Setup</span>
</div>

<div class="body">
  <div class="logo">First-time setup</div>
  <h1 id="heading">Getting things ready</h1>
  <p class="subtitle" id="subtext">Just a moment while we check your system…</p>

  <div class="steps" id="steps">
    <div class="step active" id="s1">
      <div class="step-icon">1</div>
      <div class="step-text">
        <strong>Check Ollama</strong>
        <span id="s1-detail">Looking for Ollama on your machine…</span>
      </div>
    </div>
    <div class="step waiting" id="s2">
      <div class="step-icon">2</div>
      <div class="step-text">
        <strong>Download AI model</strong>
        <span id="s2-detail">qwen2.5:7b-instruct (~5 GB, one-time download)</span>
      </div>
    </div>
    <div class="step waiting" id="s3">
      <div class="step-icon">3</div>
      <div class="step-text">
        <strong>Start background server</strong>
        <span id="s3-detail">Launches the local summarization server</span>
      </div>
    </div>
  </div>

  <div class="log" id="log"></div>

  <div class="actions">
    <button class="btn-secondary" id="btn-secondary" style="display:none">Install Ollama</button>
    <button class="btn-primary"   id="btn-primary"   disabled>
      <span class="status-dot spin"></span> Checking…
    </button>
  </div>
</div>

<script src="wizard.js"></script>
</body>
</html>
